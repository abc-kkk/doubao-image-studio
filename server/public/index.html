<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio - Neon Glass</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- 侧边栏 (Glass Dock) -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">⚡️</span>
                <span class="logo-text">AI Studio</span>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-tab="chat">
                    <span class="nav-icon">💬</span>
                    <span class="nav-text">智能对话</span>
                </button>
                <button class="nav-item" data-tab="image">
                    <span class="nav-icon">🎨</span>
                    <span class="nav-text">图片生成</span>
                </button>
                <button class="nav-item" data-tab="gallery">
                    <span class="nav-icon">🖼️</span>
                    <span class="nav-text">图片库</span>
                    <span class="badge" id="gallery-count">0</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot" id="status-dot"></span>
                    <span class="status-text" id="status-text">连接中...</span>
                </div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 聊天标签页 -->
            <div class="tab-content active" id="chat-tab">
                <div class="chat-container">
                    <div class="chat-header">
                        <h2>智能对话</h2>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <button id="delete-current-conv-btn" class="btn btn-danger"
                                style="padding: 6px 12px; font-size: 0.85rem;" title="删除当前会话并开启新对话">
                                <span class="btn-icon">🗑️</span>
                                <span class="btn-text">删除当前会话</span>
                            </button>
                            <button id="delete-all-conv-btn" class="btn btn-danger"
                                style="padding: 6px 12px; font-size: 0.85rem;" title="删除所有会话">
                                <span class="btn-icon">🗑️</span>
                                <span class="btn-text">删除所有会话</span>
                            </button>
                            <div class="model-selector">
                                <select id="chat-model" class="select-input">
                                    <option value="db">豆包 Pro</option>
                                    <option value="ds">DeepSeek V3.1</option>
                                    <option value="hy">Hunyuan 7B</option>
                                    <option value="mota">ModelScope</option>
                                    <option value="g2.5">Gemini 2.5</option>
                                    <option value="g2">Gemini 2.0</option>
                                    <option value="g3">Gemini 3.0</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="chat-messages" id="chat-messages">
                        <div class="welcome-message">
                            <div class="welcome-icon">👋</div>
                            <h3>欢迎回来</h3>
                            <p>今天想聊点什么？</p>
                        </div>
                    </div>

                    <div class="chat-input-container">
                        <!-- 聊天参考图预览 -->
                        <div id="chat-reference-preview" class="reference-preview"></div>

                        <!-- 输入区域 -->
                        <div class="chat-input-row">
                            <button id="chat-select-from-gallery-btn" class="btn btn-icon-only" title="从图片库选择">
                                <span class="btn-icon">🖼️</span>
                                <span class="badge" id="chat-reference-count">0</span>
                            </button>
                            <button id="chat-upload-local-btn" class="btn btn-icon-only" title="上传本地图片">
                                <span class="btn-icon">📁</span>
                            </button>
                            <input type="file" id="chat-local-file-input" multiple accept="image/*"
                                style="display:none">

                            <textarea id="chat-input" class="chat-input" placeholder="输入消息..." rows="1"></textarea>

                            <button id="chat-send" class="btn btn-primary">
                                <span class="btn-icon">🚀</span>
                                <span class="btn-text">发送</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 图片生成标签页 -->
            <div class="tab-content" id="image-tab">
                <div class="image-gen-container">
                    <div class="image-gen-header">
                        <h2>图片生成</h2>
                        <div class="model-selector">
                            <select id="image-model" class="select-input">
                                <option value="db">豆包图像生成</option>
                                <option value="mota">ModelScope Flux</option>
                                <option value="g2.5">Gemini 2.5 Image</option>
                            </select>
                        </div>
                    </div>

                    <div class="image-gen-content">
                        <div class="prompt-section">
                            <label for="image-prompt" class="section-label">创意描述</label>
                            <textarea id="image-prompt" class="prompt-input" placeholder="描述你想象中的画面..."
                                rows="4"></textarea>

                            <div class="options-row">
                                <div class="option-group">
                                    <label for="aspect-ratio" class="option-label">比例</label>
                                    <select id="aspect-ratio" class="select-input">
                                        <option value="Auto">自动</option>
                                        <option value="1:1">1:1 正方形</option>
                                        <option value="16:9">16:9 宽屏</option>
                                        <option value="9:16">9:16 竖屏</option>
                                        <option value="4:3">4:3 标准</option>
                                        <option value="2:3">2:3 竖版</option>
                                    </select>
                                </div>

                                <button id="select-from-gallery-btn" class="btn btn-secondary">
                                    <span class="btn-icon">🖼️</span>
                                    <span class="btn-text">参考图</span>
                                    <span class="badge" id="reference-count">0</span>
                                </button>

                                <button id="upload-local-btn" class="btn btn-secondary">
                                    <span class="btn-icon">📁</span>
                                    <span class="btn-text">上传</span>
                                </button>
                                <input type="file" id="local-file-input" multiple accept="image/*" style="display:none">
                            </div>

                            <div id="reference-preview" class="reference-preview"></div>

                            <button id="generate-btn" class="btn btn-primary btn-large">
                                <span class="btn-icon">✨</span>
                                <span class="btn-text">立即生成</span>
                            </button>
                        </div>

                        <div class="result-section">
                            <div class="section-header">
                                <h3 class="section-label">创作画廊</h3>
                                <button id="clear-results-btn" class="btn btn-secondary"
                                    style="padding: 4px 12px; font-size: 0.8rem;">清空</button>
                            </div>
                            <div id="generation-results" class="generation-results">
                                <div class="empty-state">
                                    <div class="empty-icon">🎨</div>
                                    <p>你的杰作将出现在这里</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 图片库标签页 -->
            <div class="tab-content" id="gallery-tab">
                <div class="gallery-container">
                    <div class="gallery-header">
                        <h2>图片库</h2>
                        <div class="gallery-actions">
                            <button id="refresh-gallery-btn" class="btn btn-secondary">
                                <span class="btn-icon">🔄</span>
                            </button>
                            <button id="delete-selected-btn" class="btn btn-danger" disabled>
                                <span class="btn-icon">🗑️</span>
                                <span class="btn-text">删除选中</span>
                            </button>
                        </div>
                    </div>

                    <div class="gallery-grid" id="gallery-grid">
                        <div class="empty-state">
                            <div class="empty-icon">📁</div>
                            <p>空空如也</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 参考图选择模态框 -->
    <div id="reference-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>选择参考图片</h3>
                <button class="modal-close" id="modal-close"
                    style="background:none;border:none;color:white;font-size:1.5rem;cursor:pointer;">&times;</button>
            </div>
            <div class="modal-body">
                <div id="modal-gallery" class="modal-gallery"></div>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="btn btn-secondary">取消</button>
                <button id="modal-confirm" class="btn btn-primary">确认</button>
            </div>
        </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="image-preview-modal" class="image-preview-modal">
        <div class="image-preview-content">
            <button id="preview-close" class="image-preview-close">×</button>
            <img id="preview-img" class="image-preview-img" src="" alt="Preview">
            <button id="preview-download" class="image-preview-download">
                <span>📥</span>
                <span>保存原图</span>
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display: none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">AI 正在施展魔法...</div>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
